<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>git-ref | Git & GitHub CLI Reference</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>%3E_</text></svg>"
    />
  </head>
  <body class="bg-neutral-200 text-neutral-700 dark:bg-neutral-900 dark:text-neutral-200 min-h-screen relative selection:bg-neutral-700 selection:text-neutral-200 dark:selection:bg-neutral-200 dark:selection:text-neutral-700">
    <div class="fixed inset-0 pointer-events-none z-[-1] bg-[radial-gradient(circle_at_center,rgba(64,64,64,0.05)_1px,transparent_1px)] dark:bg-[radial-gradient(circle_at_center,rgba(229,229,229,0.05)_1px,transparent_1px)] bg-[size:24px_24px]"></div>
    <header
      class="sticky top-0 z-10 bg-neutral-200/60 dark:bg-neutral-900/60 backdrop-blur-md border-b border-neutral-700/10 dark:border-neutral-200/10"
    >
      <div class="w-full px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
        <h1 class="text-lg font-bold tracking-tight shrink-0 font-mono">
          &gt;_ git-ref
        </h1>

        <input
          id="search"
          type="text"
          placeholder="Search commands..."
          autocomplete="off"
          class="flex-1 max-w-md px-4 py-2 rounded-md border border-neutral-700/10 dark:border-neutral-200/10 bg-neutral-200/50 dark:bg-neutral-900/50 backdrop-blur-sm text-sm placeholder-neutral-700/40 dark:placeholder-neutral-200/40 focus:outline-none focus:ring-1 focus:ring-neutral-700 dark:focus:ring-neutral-200 focus:bg-neutral-200 dark:focus:bg-neutral-900"
        />

        <button
          id="theme-toggle"
          type="button"
          class="p-2.5 rounded-md border border-neutral-700/10 dark:border-neutral-200/10 hover:bg-neutral-700/5 dark:hover:bg-neutral-200/5 active:bg-neutral-700/10 dark:active:bg-neutral-200/10 text-sm leading-none focus:outline-none focus:ring-1 focus:ring-neutral-700 dark:focus:ring-neutral-200"
          aria-label="Toggle theme"
        ></button>
      </div>
    </header>

    <p
      id="empty"
      class="hidden text-center text-neutral-700/50 dark:text-neutral-200/50 mt-20 text-sm"
    >
      No commands found.
    </p>

    <main
      id="grid"
      class="w-full px-4 sm:px-6 py-8 columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6"
    ></main>

    <script type="module" src="/src/index.js"></script>
  </body>
</html>
